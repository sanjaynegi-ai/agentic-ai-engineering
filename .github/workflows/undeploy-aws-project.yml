name: Terraform undeploy project from AWS

on:
  workflow_dispatch:
    inputs:
      project:
        description: Project and framework implementation to remove
        required: true
        type: choice
        options:
          - comparison_travel_agent_no_framework
          - comparison_travel_agent_openai_agents_sdk
          - travel_planner_agent_no_framework
          - travel_planner_agent_openai_agents_sdk
          - customer_support_router_no_framework
          - customer_support_router_openai_agents_sdk
          - research_assistant_agent_no_framework
          - research_assistant_agent_openai_agents_sdk
      confirm_project:
        description: Retype the exact selected project value to authorize destruction
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: aws-project-${{ inputs.project }}
  cancel-in-progress: false

jobs:
  undeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Verify explicit destruction confirmation
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.confirm_project }}" != "${{ inputs.project }}" ]]; then
            echo "Confirmation must exactly match the selected project." >&2
            exit 1
          fi

      - id: context
        name: Resolve project selector
        shell: bash
        run: |
          set -euo pipefail
          python scripts/resolve_project.py --selection "${{ inputs.project }}" --image-tag "destroy" --github-output "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - id: state
        name: Detect project Terraform state
        shell: bash
        run: |
          set -euo pipefail
          for stack in ecs eks ecr; do
            key="$stack/${{ inputs.project }}.tfstate"
            state_file="$(mktemp)"
            if aws s3api get-object --bucket "${{ vars.TF_STATE_BUCKET }}" --key "$key" "$state_file" >/dev/null 2>&1 && python -c 'import json, sys; raise SystemExit(not bool(json.load(open(sys.argv[1], encoding="utf-8")).get("resources")))' "$state_file"; then
              echo "$stack=true" >> "$GITHUB_OUTPUT"
              echo "Found managed resources in s3://${{ vars.TF_STATE_BUCKET }}/$key"
            else
              echo "$stack=false" >> "$GITHUB_OUTPUT"
              echo "No managed resources found for $stack; that stack will be skipped."
            fi
            rm -f "$state_file"
          done

      - if: steps.state.outputs.ecs == 'true'
        name: Destroy ECS application stack
        working-directory: infra/terraform/ecs
        run: |
          terraform init -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="key=ecs/${{ inputs.project }}.tfstate" -backend-config="region=${{ vars.AWS_REGION }}" -backend-config="encrypt=true" -backend-config="use_lockfile=true"
          terraform validate
          terraform plan -destroy -input=false -out=destroy.tfplan -var="aws_region=${{ vars.AWS_REGION }}" -var="project_name=${{ steps.context.outputs.deployment_name }}" -var="image_uri=destroy.invalid/${{ inputs.project }}:destroy" -var="vpc_id=${{ vars.AWS_VPC_ID }}" -var='public_subnet_ids=${{ vars.AWS_PUBLIC_SUBNET_IDS_JSON }}' -var="openai_secret_arn=${{ vars.OPENAI_SECRET_ARN }}"
          terraform apply -input=false -auto-approve destroy.tfplan
          test -z "$(terraform state list)"

      - if: steps.state.outputs.eks == 'true'
        name: Destroy EKS application stack
        working-directory: infra/terraform/eks
        run: |
          terraform init -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="key=eks/${{ inputs.project }}.tfstate" -backend-config="region=${{ vars.AWS_REGION }}" -backend-config="encrypt=true" -backend-config="use_lockfile=true"
          terraform validate
          terraform plan -destroy -input=false -out=destroy.tfplan -var="aws_region=${{ vars.AWS_REGION }}" -var="eks_cluster_name=${{ vars.EKS_CLUSTER }}" -var="project_name=${{ steps.context.outputs.deployment_name }}" -var="image_uri=destroy.invalid/${{ inputs.project }}:destroy"
          terraform apply -input=false -auto-approve destroy.tfplan
          test -z "$(terraform state list)"

      - if: steps.state.outputs.ecr == 'true'
        name: Destroy ECR repository and contained project images
        working-directory: infra/terraform/ecr
        run: |
          terraform init -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="key=ecr/${{ inputs.project }}.tfstate" -backend-config="region=${{ vars.AWS_REGION }}" -backend-config="encrypt=true" -backend-config="use_lockfile=true"
          terraform validate
          terraform plan -destroy -input=false -out=destroy.tfplan -var="aws_region=${{ vars.AWS_REGION }}" -var="project_name=${{ inputs.project }}" -var="force_delete=true"
          terraform apply -input=false -auto-approve destroy.tfplan
          test -z "$(terraform state list)"

      - name: Publish undeployment summary
        shell: bash
        run: |
          {
            echo "### AWS project undeployment complete"
            echo "- Selector: ${{ inputs.project }}"
            echo "- ECS state found: ${{ steps.state.outputs.ecs }}"
            echo "- EKS state found: ${{ steps.state.outputs.eks }}"
            echo "- ECR state found: ${{ steps.state.outputs.ecr }}"
            echo "- Terraform state history was retained in S3."
            echo "- Shared VPC, subnets, state bucket, OIDC role, EKS cluster, namespace, and Secrets Manager secret were preserved."
          } >> "$GITHUB_STEP_SUMMARY"
